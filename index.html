<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>속독 · 속청 훈련</title>

<!-- AdSense — 본인 ID로 교체 -->
<!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script> -->

<!-- React + Babel CDN -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { font-family: 'Malgun Gothic','Apple SD Gothic Neo','맑은 고딕',sans-serif; }
  input[type=range] { accent-color: #378ADD; cursor: pointer; width: 100%; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #f0f2f5; }
  ::-webkit-scrollbar-thumb { background: #bec8d4; border-radius: 2px; }
  .card  { background: #fff; border-radius: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.07); padding: 1.25rem 1.5rem; }
  .lbl   { font-size: .7rem; font-weight: 700; letter-spacing: .1em; color: #6b7a8d; text-transform: uppercase; margin-bottom: .85rem; }
  .badge { display: inline-flex; align-items: center; padding: .22rem .65rem; border-radius: 6px; font-size: .78rem; font-weight: 700; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ── 디자인 토큰 ── */
const C = {
  bg:"#f0f2f5", surface:"#ffffff", primary:"#378ADD",
  primaryLight:"rgba(55,138,221,0.09)", primaryBorder:"rgba(55,138,221,0.28)",
  text:"#1e2a38", textSub:"#6b7a8d", textGhost:"#bec8d4",
  border:"rgba(0,0,0,0.08)", shadow:"0 2px 10px rgba(0,0,0,0.07)",
  shadowUp:"0 -2px 10px rgba(0,0,0,0.06)",
  ok:"#27ae60", okLight:"rgba(39,174,96,0.1)", err:"#e74c3c",
};
const FONT = "'Malgun Gothic','Apple SD Gothic Neo','맑은 고딕',sans-serif";

/* ── AdSense 설정 — 본인 ID로 교체 ── */
const AD_CLIENT = "ca-pub-XXXXXXXXXXXXXXXX";
const AD_SLOT   = "XXXXXXXXXX";

const FONT_BY_LINES = { 8:"1.52rem", 9:"1.38rem", 10:"1.22rem" };

/* ── 파싱 유틸 ── */
function parseLines(text) {
  const byNL = text.split("\n").map(l => l.trim()).filter(Boolean);
  if (byNL.length >= 3) return byNL;
  return text.trim().replace(/([.!?。])\s+/g,"$1\n").split("\n").map(l=>l.trim()).filter(Boolean);
}

function parseQuiz(raw) {
  if (!raw.trim()) return [];
  const qs = [];
  raw.trim().split(/\n\s*\n+/).forEach(block => {
    const lines = block.split("\n").map(l=>l.trim()).filter(Boolean);
    if (lines.length < 3) return;
    const question = lines[0].replace(/^\d+[.\s]+/,"").trim();
    const choices  = lines.filter(l=>/^[①②③④⑤]/.test(l));
    const aLine    = lines.find(l=>/^정답\s*[:：]/.test(l));
    const answer   = aLine ? aLine.replace(/^정답\s*[:：]\s*/,"").trim()[0] : "";
    if (question && choices.length >= 2) qs.push({ question, choices, answer });
  });
  return qs.slice(0,5);
}

function parseTxt(raw, lpp) {
  const qi = raw.indexOf("[QUIZ]");
  const bodyRaw = (qi >= 0 ? raw.slice(0,qi) : raw).trim();
  const quizRaw = qi >= 0 ? raw.slice(qi+6).trim() : "";
  const lines = parseLines(bodyRaw);
  const pages = [];
  for (let i = 0; i < lines.length; i += lpp)
    pages.push(lines.slice(i, i+lpp).join(" "));
  return { pages: pages.length ? pages : [bodyRaw], quiz: parseQuiz(quizRaw) };
}

function pickRandom(arr, n) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a.slice(0,n);
}

/* ── 서버 URL ── */
const SERVER_URL = "https://jsmylife365.github.io/js-speedreader";

/* ════════════════════════════════════════════════
   메인 컴포넌트
════════════════════════════════════════════════ */
function SpeedReader() {
  const [phase,  setPhase]  = useState("home");
  const [sUrl,   setSUrl]   = useState(SERVER_URL);
  const [sStat,  setSStat]  = useState("idle");
  const [sErr,   setSErr]   = useState("");
  const [sItems, setSItems] = useState([]);
  const [help,   setHelp]   = useState(false);

  const [raw,     setRaw]     = useState("");
  const [title,   setTitle]   = useState("");
  const [audSrc,  setAudSrc]  = useState(null);
  const [audName, setAudName] = useState("");

  const [lpp,  setLpp]  = useState(9);
  const [lvl,  setLvl]  = useState("중");
  const [wpm,  setWpm]  = useState(200);
  const [bwpm, setBwpm] = useState(180);
  const [sync, setSync] = useState(true);

  const [cp,  setCp]       = useState(0);
  const [ci,  setCi]       = useState(0);
  const [playing, setPlay] = useState(false);
  const [done,    setDone] = useState(false);
  const [readCount, setReadCnt] = useState(0);

  const [qi,          setQi]      = useState(0);
  const [sel,         setSel]     = useState(null);
  const [answers,     setAnswers] = useState([]);
  const [activeQuiz,  setAQ]      = useState([]);
  const [aiGenerating,setAiGen]   = useState(false);
  const [quizDone,    setQDone]   = useState(false);
  const [adCountdown, setAdCnt]   = useState(5);

  const audRef  = useRef(null);
  const timer   = useRef(null);
  const lAudRef = useRef(null);
  const cpR = useRef(0), ciR = useRef(0), gsR = useRef(2), sdR = useRef(null);

  useEffect(()=>{ cpR.current=cp; },[cp]);
  useEffect(()=>{ ciR.current=ci; },[ci]);

  const groupSize = useMemo(()=>({하:1,중:2,상:3}[lvl]),[lvl]);
  const fontSize  = useMemo(()=>FONT_BY_LINES[lpp]||"1.3rem",[lpp]);
  const ms        = useMemo(()=>Math.round((groupSize*60000)/wpm),[groupSize,wpm]);
  const rate      = useMemo(()=>Math.min(4,Math.max(0.25,wpm/bwpm)),[wpm,bwpm]);

  useEffect(()=>{ gsR.current=groupSize; },[groupSize]);

  const parsed = useMemo(()=> raw ? parseTxt(raw,lpp) : {pages:[],quiz:[]}, [raw,lpp]);
  useEffect(()=>{ sdR.current=parsed; },[parsed]);

  const pageWords = useMemo(()=> parsed.pages[cp]?.split(/\s+/).filter(Boolean)??[], [parsed,cp]);

  const {totalW, pageBounds} = useMemo(()=>{
    if (!parsed.pages.length) return {totalW:0,pageBounds:[]};
    let s=0;
    const pb = parsed.pages.map(p=>{
      const wc=p.split(/\s+/).filter(Boolean).length; const st=s; s+=wc; return {start:st,end:s};
    });
    return {totalW:s, pageBounds:pb};
  },[parsed]);

  const globalIdx = (pageBounds[cp]?.start??0)+ci;
  const progress  = totalW>0?(globalIdx/totalW)*100:0;

  /* ── 서버 연결 ── */
  const connect = useCallback(async()=>{
    if (!sUrl.trim()) return;
    setSStat("loading"); setSErr("");
    try {
      const base = sUrl.replace(/\/$/,"");
      const res  = await fetch(`${base}/Data/index.json`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const titles = await res.json();
      if (!Array.isArray(titles)) throw new Error("index.json은 배열이어야 합니다");
      setSItems(titles.map(t=>({id:t,title:t,isServer:true,_b:base})));
      setSStat("ok");
    } catch(e){ setSStat("error"); setSErr(e.message); }
  },[sUrl]);

  useEffect(()=>{ connect(); },[]);

  /* ── 세션 로드 ── */
  const loadItem = useCallback(async(item)=>{
    try {
      const r = await fetch(`${item._b}/Data/${item.title}.txt`);
      if (!r.ok) throw new Error(`${item.title}.txt — HTTP ${r.status}`);
      setRaw(await r.text()); setTitle(item.title);
      try {
        const ar = await fetch(`${item._b}/Data/${item.title}.mp3`);
        if (ar.ok){ setAudSrc(URL.createObjectURL(await ar.blob())); setAudName(`${item.title}.mp3`); }
        else { setAudSrc(null); setAudName(""); }
      } catch(_){ setAudSrc(null); setAudName(""); }
    } catch(e){ alert("로드 실패: "+e.message); return; }
    setCp(0); setCi(0); setPlay(false); setDone(false); setReadCnt(0);
    setPhase("settings");
  },[]);

  /* ── 훈련 시작 ── */
  const startReading = useCallback(()=>{
    setCp(0); setCi(0); setPlay(false); setDone(false);
    if (audRef.current){ audRef.current.currentTime=0; try{audRef.current.playbackRate=sync?rate:1;}catch(_){} }
    setPhase("reading");
  },[sync,rate]);

  /* ── 타이머 ── */
  useEffect(()=>{
    clearInterval(timer.current);
    if (!playing||done) return;
    timer.current = setInterval(()=>{
      const sd=sdR.current; if(!sd?.pages.length) return;
      const p=cpR.current, i=ciR.current, g=gsR.current;
      const words=sd.pages[p].split(/\s+/).filter(Boolean);
      const nx=i+g;
      if (nx>=words.length){
        if (p+1>=sd.pages.length){ clearInterval(timer.current); setPlay(false); setDone(true); setReadCnt(c=>c+1); }
        else { setCp(p+1); setCi(0); }
      } else { setCi(nx); }
    },ms);
    return ()=>clearInterval(timer.current);
  },[playing,done,ms]);

  useEffect(()=>{
    if (!audRef.current||!audSrc) return;
    try{audRef.current.playbackRate=sync?rate:1;}catch(_){}
  },[rate,sync,audSrc]);

  const togglePlay = useCallback(()=>{
    if (done){
      setCp(0); setCi(0); setDone(false);
      if (audRef.current){ audRef.current.currentTime=0; try{audRef.current.playbackRate=sync?rate:1;}catch(_){} }
      setPlay(true); audRef.current?.play?.().catch(()=>{});
      return;
    }
    const nx=!playing; setPlay(nx);
    if (audRef.current&&audSrc){ if(nx) audRef.current.play().catch(()=>{}); else audRef.current.pause(); }
  },[done,playing,audSrc,sync,rate]);

  const resetReading = useCallback(()=>{
    setPlay(false); setCp(0); setCi(0); setDone(false);
    if (audRef.current){ audRef.current.pause(); audRef.current.currentTime=0; }
  },[]);

  const goPage = useCallback((d)=>{
    const t=cpR.current+d;
    if (!parsed.pages||t<0||t>=parsed.pages.length) return;
    setPlay(false); if(audRef.current) audRef.current.pause();
    setCp(t); setCi(0); setDone(false);
  },[parsed]);

  /* ── AI 퀴즈 생성 ── */
  const generateQuiz = useCallback(async()=>{
    setAiGen(true);
    try {
      const fullText = parsed.pages.join(" ");
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:1000,
          messages:[{role:"user",content:`다음 글을 읽고 독해 이해도를 평가하는 객관식 문제 10개를 만들어 주세요.\n\n[본문]\n${fullText}\n\n반드시 아래 JSON 배열 형식으로만 응답하세요. 설명이나 다른 텍스트는 절대 포함하지 마세요.\n[\n  {\n    "question": "질문 내용",\n    "choices": ["① 선택지1", "② 선택지2", "③ 선택지3", "④ 선택지4"],\n    "answer": "②"\n  }\n]\n\n조건:\n- 반드시 본문 내용에 근거한 문제만 출제\n- 선택지는 정확히 4개 (①②③④ 앞에 붙임)\n- answer는 정답 선택지의 맨 앞 글자 하나 (①②③④ 중 하나)\n- 한국어로 작성`}],
        }),
      });
      const data = await res.json();
      const txt  = data.content?.find(b=>b.type==="text")?.text||"";
      const questions = JSON.parse(txt.replace(/```json|```/g,"").trim());
      if (!Array.isArray(questions)||!questions.length) throw new Error("파싱 실패");
      setAQ(pickRandom(questions,5));
      setQi(0); setSel(null); setAnswers([]); setQDone(false);
      setPhase("quiz");
    } catch(e){ alert("AI 문제 생성 실패: "+e.message); }
    finally{ setAiGen(false); }
  },[parsed.pages]);

  const submitAnswer = useCallback(()=>{
    if (sel===null) return;
    const q=activeQuiz[qi];
    const na=[...answers,{choice:sel,isCorrect:sel[0]===q.answer,correctChoice:q.choices.find(c=>c[0]===q.answer)||q.answer}];
    setAnswers(na);
    if (qi+1>=activeQuiz.length) setQDone(true);
    else { setQi(qi+1); setSel(null); }
  },[sel,qi,activeQuiz,answers]);

  /* ── 광고 카운트다운 ── */
  useEffect(()=>{
    if (phase!=="ad") return;
    setAdCnt(5);
    const t=setInterval(()=>setAdCnt(c=>{ if(c<=1){clearInterval(t);return 0;} return c-1; }),1000);
    return ()=>clearInterval(t);
  },[phase]);
  useEffect(()=>{ if(phase==="ad"&&adCountdown===0) setPhase("result"); },[phase,adCountdown]);
  useEffect(()=>{
    if(phase!=="ad") return;
    try{(window.adsbygoogle=window.adsbygoogle||[]).push({});}catch(_){}
  },[phase]);

  /* ── 낱말 렌더링 ── */
  const renderWords = useCallback(()=>
    pageWords.map((w,i)=>{
      const on=i>=ci&&i<ci+groupSize, old=i<ci;
      return <span key={i} style={{fontWeight:700,color:on?C.primary:old?C.textGhost:C.text,transition:"color 0.08s linear",marginRight:"0.38em"}}>{w}</span>;
    }),[pageWords,ci,groupSize]);

  /* ════ ① HOME ════ */
  if (phase==="home") return (
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:FONT,color:C.text}}>
      <div style={{background:C.surface,boxShadow:C.shadow,padding:".85rem 1.5rem",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontSize:".62rem",letterSpacing:".18em",color:C.primary,marginBottom:".1rem"}}>JS 훈련 시리즈</div>
          <div style={{fontSize:"1.1rem",fontWeight:700}}>속독 · 속청 훈련</div>
        </div>
        <button onClick={()=>setHelp(h=>!h)} style={{background:help?C.primaryLight:C.bg,border:`1px solid ${help?C.primaryBorder:C.border}`,color:help?C.primary:C.textSub,borderRadius:"8px",padding:".4rem .85rem",fontFamily:FONT,fontSize:".8rem",cursor:"pointer"}}>？ 파일 구조</button>
      </div>
      <div style={{maxWidth:"680px",margin:"0 auto",padding:"1.25rem 1rem"}}>
        {help&&(
          <div className="card" style={{marginBottom:"1rem",borderLeft:`3px solid ${C.primary}`}}>
            <div className="lbl">📁 업로드 파일 구조</div>
            <pre style={{background:C.bg,borderRadius:"8px",padding:".85rem 1rem",fontSize:".78rem",lineHeight:"1.85",color:C.text,overflow:"auto"}}>{`js-speedreader/\n└── Data/\n    ├── index.json  ← ["제목1","제목2"]\n    ├── 제목1.txt\n    └── 제목1.mp3   ← 없어도 됨`}</pre>
          </div>
        )}
        <div className="card" style={{marginBottom:"1rem"}}>
          <div className="lbl">📡 서버 연결</div>
          <div style={{display:"flex",gap:".6rem",marginBottom:".5rem"}}>
            <input type="text" value={sUrl} onChange={e=>setSUrl(e.target.value)} onKeyDown={e=>e.key==="Enter"&&connect()}
              style={{flex:1,padding:".6rem .9rem",borderRadius:"8px",border:`1px solid ${C.border}`,fontSize:".82rem",color:C.text,background:C.bg,outline:"none",fontFamily:FONT}}/>
            <button onClick={connect} disabled={sStat==="loading"} style={{padding:".6rem 1.1rem",borderRadius:"8px",border:"none",background:C.primary,color:"#fff",fontFamily:FONT,fontSize:".88rem",fontWeight:700,cursor:"pointer",opacity:sStat==="loading"?.6:1}}>
              {sStat==="loading"?"연결 중…":"연결"}
            </button>
          </div>
          {sStat==="error"&&<div style={{fontSize:".73rem",color:C.err}}>⚠ {sErr}</div>}
          {sStat==="ok"&&<div style={{fontSize:".73rem",color:C.ok}}>✓ {sItems.length}개 콘텐츠 연결됨</div>}
          {sStat==="loading"&&<div style={{fontSize:".73rem",color:C.primary}}>서버 탐색 중…</div>}
        </div>
        <div className="card">
          <div className="lbl">📚 콘텐츠 선택</div>
          {sStat==="loading"&&<div style={{textAlign:"center",padding:"2rem",color:C.textSub,fontSize:".88rem"}}>불러오는 중…</div>}
          {sStat==="error"&&(
            <div style={{textAlign:"center",padding:"1.5rem"}}>
              <div style={{fontSize:"1.5rem",marginBottom:".5rem"}}>⚠️</div>
              <div style={{fontSize:".85rem",color:C.err,marginBottom:".75rem"}}>서버 연결 실패</div>
              <div style={{fontSize:".75rem",color:C.textSub,marginBottom:"1rem",lineHeight:1.6}}>GitHub Pages 배포 후 1~3분 소요됩니다.<br/>잠시 후 다시 시도해 주세요.</div>
              <button onClick={connect} style={{padding:".55rem 1.25rem",borderRadius:"8px",border:"none",background:C.primary,color:"#fff",fontFamily:FONT,fontSize:".85rem",fontWeight:700,cursor:"pointer"}}>다시 연결</button>
            </div>
          )}
          {sItems.length>0&&(
            <div style={{display:"flex",flexDirection:"column",gap:".55rem"}}>
              {sItems.map(s=>(
                <button key={s.id} onClick={()=>loadItem(s)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:".85rem 1rem",borderRadius:"9px",border:`1px solid ${C.border}`,background:C.bg,cursor:"pointer",fontFamily:FONT,textAlign:"left",transition:"all .12s"}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=C.primary;e.currentTarget.style.background=C.primaryLight;}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.background=C.bg;}}>
                  <div>
                    <div style={{fontSize:".95rem",fontWeight:700,color:C.text,marginBottom:".18rem"}}>{s.title}</div>
                    <div style={{fontSize:".72rem",color:C.textSub}}>📡 서버</div>
                  </div>
                  <div style={{color:C.primary,fontSize:"1.1rem"}}>›</div>
                </button>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );

  /* ════ ② SETTINGS ════ */
  if (phase==="settings") return (
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:FONT,color:C.text}}>
      <div style={{background:C.surface,boxShadow:C.shadow,padding:".85rem 1.5rem",display:"flex",alignItems:"center",gap:".85rem"}}>
        <button onClick={()=>setPhase("home")} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:"6px",padding:".3rem .6rem",cursor:"pointer",fontSize:".85rem",color:C.textSub,fontFamily:FONT}}>← 목록</button>
        <div>
          <div style={{fontSize:".62rem",letterSpacing:".12em",color:C.primary}}>훈련 설정</div>
          <div style={{fontSize:"1rem",fontWeight:700}}>{title}</div>
        </div>
      </div>
      <div style={{maxWidth:"560px",margin:"0 auto",padding:"1.25rem 1rem"}}>
        {/* 줄 수 */}
        <div className="card" style={{marginBottom:"1rem"}}>
          <div className="lbl">페이지 당 줄 수 · 글자 크기</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:".6rem",marginBottom:".75rem"}}>
            {[[8,"8줄","큰 글자"],[9,"9줄","중간 글자"],[10,"10줄","보통 글자"]].map(([n,l,d])=>(
              <button key={n} onClick={()=>setLpp(n)} style={{padding:".85rem .5rem",borderRadius:"9px",cursor:"pointer",border:`2px solid ${lpp===n?C.primary:C.border}`,background:lpp===n?C.primaryLight:C.bg,fontFamily:FONT,textAlign:"center"}}>
                <div style={{fontSize:"1.1rem",fontWeight:700,color:lpp===n?C.primary:C.text}}>{l}</div>
                <div style={{fontSize:".72rem",color:C.textSub,marginTop:".2rem"}}>{d}</div>
              </button>
            ))}
          </div>
          <div style={{background:C.bg,borderRadius:"8px",padding:".6rem .9rem",fontSize:".78rem",color:C.textSub,display:"flex",gap:"1.25rem"}}>
            <span>📄 총 <strong style={{color:C.primary}}>{parsed.pages.length}</strong>페이지</span>
            {parsed.quiz.length>0?<span>📝 퀴즈 <strong style={{color:C.primary}}>{parsed.quiz.length}</strong>문제</span>:<span style={{color:C.textGhost}}>퀴즈 없음 (AI 자동 생성 가능)</span>}
          </div>
        </div>
        {/* 수준 */}
        <div className="card" style={{marginBottom:"1rem"}}>
          <div className="lbl">강조 수준</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:".6rem"}}>
            {[["하","1 낱말씩"],["중","2 낱말씩"],["상","3 낱말씩"]].map(([l,d])=>(
              <button key={l} onClick={()=>setLvl(l)} style={{padding:".85rem .5rem",borderRadius:"9px",cursor:"pointer",border:`2px solid ${lvl===l?C.primary:C.border}`,background:lvl===l?C.primaryLight:C.bg,fontFamily:FONT,textAlign:"center"}}>
                <div style={{fontSize:"1.1rem",fontWeight:700,color:lvl===l?C.primary:C.text}}>{l}</div>
                <div style={{fontSize:".72rem",color:C.textSub,marginTop:".2rem"}}>{d}</div>
              </button>
            ))}
          </div>
        </div>
        {/* 속도 */}
        <div className="card" style={{marginBottom:"1rem"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:".85rem"}}>
            <div className="lbl" style={{margin:0}}>읽기 속도</div>
            <span className="badge" style={{background:C.primaryLight,color:C.primary,border:`1px solid ${C.primaryBorder}`}}>{wpm} wpm</span>
          </div>
          <input type="range" min={60} max={500} step={10} value={wpm} onChange={e=>setWpm(Number(e.target.value))}/>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:".7rem",color:C.textGhost,marginTop:".45rem"}}>
            <span>60 (느림)</span><span>강조 간격 {ms}ms</span><span>500 (빠름)</span>
          </div>
        </div>
        {/* 음원 */}
        <div className="card" style={{marginBottom:"1.25rem"}}>
          <div className="lbl">🎵 음원 · 속청 설정</div>
          {!audSrc?(
            <div style={{display:"flex",alignItems:"center",gap:".75rem"}}>
              <button onClick={()=>lAudRef.current?.click()} style={{padding:".55rem 1rem",borderRadius:"8px",border:`1px solid ${C.border}`,background:C.bg,fontFamily:FONT,fontSize:".85rem",color:C.textSub,cursor:"pointer"}}>+ MP3 업로드</button>
              <span style={{fontSize:".72rem",color:C.textGhost}}>{audName||"서버 연결 시 자동 로드"}</span>
              <input ref={lAudRef} type="file" accept="audio/*" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f){setAudSrc(URL.createObjectURL(f));setAudName(f.name);setSync(true);}}}/>
            </div>
          ):(
            <div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:".9rem"}}>
                <div style={{fontSize:".85rem",color:C.text}}>🎵 {audName}</div>
                <button onClick={()=>{setAudSrc(null);setAudName("");}} style={{background:"none",border:"none",color:C.textGhost,cursor:"pointer",fontFamily:FONT,fontSize:".82rem"}}>✕ 제거</button>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:".5rem"}}>
                <div style={{fontSize:".8rem",color:C.textSub}}>음원 녹음 속도</div>
                <span style={{fontSize:".85rem",fontWeight:700,color:C.primary}}>{bwpm} wpm</span>
              </div>
              <input type="range" min={60} max={300} step={10} value={bwpm} onChange={e=>setBwpm(Number(e.target.value))} style={{marginBottom:".7rem"}}/>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:C.bg,borderRadius:"8px",padding:".6rem .85rem"}}>
                <div style={{fontSize:".8rem",color:C.textSub}}>재생속도 <strong style={{color:rate>2.5?"#c0392b":rate>1.5?"#d68910":C.primary}}>{rate.toFixed(2)}x</strong>{rate>=1.5&&<span style={{marginLeft:".4em",fontSize:".72rem",color:"#d68910"}}>속청 훈련</span>}</div>
                <button onClick={()=>setSync(s=>!s)} style={{padding:".25rem .75rem",borderRadius:"6px",cursor:"pointer",border:`1px solid ${sync?C.primaryBorder:C.border}`,background:sync?C.primaryLight:"none",color:sync?C.primary:C.textSub,fontFamily:FONT,fontSize:".78rem"}}>동기화 {sync?"ON":"OFF"}</button>
              </div>
            </div>
          )}
        </div>
        <button onClick={startReading} style={{width:"100%",padding:"1rem",borderRadius:"10px",border:"none",background:C.primary,color:"#fff",fontFamily:FONT,fontSize:"1rem",fontWeight:700,cursor:"pointer",boxShadow:"0 3px 14px rgba(55,138,221,.32)",letterSpacing:".1em"}}>훈련 시작</button>
      </div>
    </div>
  );

  /* ════ ③ READING ════ */
  if (phase==="reading") return (
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:C.bg,fontFamily:FONT,color:C.text,overflow:"hidden"}}>
      <div style={{background:C.surface,boxShadow:C.shadow,padding:".65rem 1.25rem",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",gap:".7rem"}}>
          <button onClick={()=>{setPlay(false);if(audRef.current)audRef.current.pause();setPhase("settings");}} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:"6px",padding:".3rem .6rem",cursor:"pointer",fontSize:".85rem",color:C.textSub,fontFamily:FONT}}>←</button>
          <div><div style={{fontSize:".6rem",letterSpacing:".12em",color:C.primary}}>속독 훈련</div><div style={{fontSize:".9rem",fontWeight:700}}>{title}</div></div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:".45rem"}}>
          {["하","중","상"].map(l=>(
            <button key={l} onClick={()=>setLvl(l)} style={{padding:".22rem .6rem",borderRadius:"5px",fontSize:".8rem",border:`1px solid ${lvl===l?C.primary:C.border}`,background:lvl===l?C.primaryLight:"none",color:lvl===l?C.primary:C.textSub,fontFamily:FONT,cursor:"pointer",fontWeight:lvl===l?700:400}}>{l}</button>
          ))}
          <span className="badge" style={{background:C.primaryLight,color:C.primary,border:`1px solid ${C.primaryBorder}`,marginLeft:".2rem"}}>{wpm}wpm</span>
          <span className="badge" style={{background:C.bg,color:C.textSub,border:`1px solid ${C.border}`}}>{cp+1}/{parsed.pages.length}</span>
          {audSrc&&<span className="badge" style={{background:C.bg,border:`1px solid ${C.border}`,color:rate>2.5?"#c0392b":rate>1.5?"#d68910":C.primary}}>🔊 {rate.toFixed(1)}x</span>}
        </div>
      </div>
      <div style={{height:"3px",background:C.border,flexShrink:0}}>
        <div style={{height:"100%",width:`${progress}%`,background:C.primary,transition:"width .25s ease"}}/>
      </div>
      <div style={{flex:1,overflow:"auto"}}>
        <div style={{maxWidth:"700px",margin:"0 auto",padding:"2rem 2.5rem",fontSize,lineHeight:"2.15",letterSpacing:".01em",textAlign:"justify",wordBreak:"keep-all"}}>
          {done?(
            <div style={{textAlign:"center",padding:"3rem 0"}}>
              <div style={{fontSize:"2.5rem",marginBottom:".5rem"}}>{readCount===1?"✓":"🎉"}</div>
              <div style={{fontSize:"1.2rem",fontWeight:700,color:C.text,marginBottom:".3rem"}}>{readCount===1?"1회 완독":"2회 완독 완료!"}</div>
              <div style={{fontSize:".88rem",color:C.textSub,marginBottom:"2rem"}}>{totalW}어절 · {parsed.pages.length}페이지</div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:".8rem"}}>
                {readCount===1&&(
                  <button onClick={()=>setPhase("settings")} style={{width:"270px",padding:".8rem",borderRadius:"10px",border:`1px solid ${C.border}`,background:C.surface,fontFamily:FONT,fontSize:".95rem",color:C.textSub,cursor:"pointer",fontWeight:700,boxShadow:C.shadow}}>⚙ 설정 바꾸고 다시보기</button>
                )}
                <button onClick={generateQuiz} disabled={aiGenerating} style={{width:"270px",padding:".8rem",borderRadius:"10px",border:"none",background:aiGenerating?C.textGhost:C.primary,color:"#fff",fontFamily:FONT,fontSize:".95rem",fontWeight:700,cursor:aiGenerating?"not-allowed":"pointer",boxShadow:aiGenerating?"none":"0 2px 14px rgba(55,138,221,.35)",display:"flex",alignItems:"center",justifyContent:"center",gap:".5rem"}}>
                  {aiGenerating?<><span style={{display:"inline-block",animation:"spin 1s linear infinite"}}>⏳</span>AI 문제 생성 중…</>:"📝 문제 풀기"}
                </button>
              </div>
            </div>
          ):renderWords()}
        </div>
      </div>
      <div style={{background:C.surface,boxShadow:C.shadowUp,padding:".85rem 1.25rem",flexShrink:0}}>
        <div style={{maxWidth:"560px",margin:"0 auto .85rem",display:"flex",alignItems:"center",gap:".6rem"}}>
          <span style={{fontSize:".75rem",color:C.textGhost}}>느림</span>
          <input type="range" min={60} max={500} step={10} value={wpm} onChange={e=>setWpm(Number(e.target.value))}/>
          <span style={{fontSize:".75rem",color:C.textGhost}}>빠름</span>
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:".55rem",maxWidth:"560px",margin:"0 auto"}}>
          <button onClick={()=>goPage(-1)} disabled={cp===0} style={{padding:".58rem .95rem",borderRadius:"8px",border:`1px solid ${C.border}`,background:C.bg,fontFamily:FONT,fontSize:".85rem",color:C.textSub,cursor:cp===0?"not-allowed":"pointer",opacity:cp===0?.35:1}}>◀ 이전</button>
          <button onClick={resetReading} style={{padding:".58rem .75rem",borderRadius:"8px",border:`1px solid ${C.border}`,background:C.bg,fontFamily:FONT,fontSize:".95rem",color:C.textSub,cursor:"pointer"}}>↺</button>
          <button onClick={togglePlay} style={{padding:".65rem 2.8rem",borderRadius:"9px",border:"none",background:playing?C.err:C.primary,color:"#fff",fontFamily:FONT,fontSize:".95rem",fontWeight:700,cursor:"pointer",minWidth:"130px",letterSpacing:".06em",boxShadow:`0 2px 10px ${playing?"rgba(231,76,60,.28)":"rgba(55,138,221,.28)"}`}}>
            {done?"↺ 다시 시작":playing?"⏸ 일시정지":"▶ 시   작"}
          </button>
          <button onClick={()=>goPage(1)} disabled={cp>=parsed.pages.length-1} style={{padding:".58rem .95rem",borderRadius:"8px",border:`1px solid ${C.border}`,background:C.bg,fontFamily:FONT,fontSize:".85rem",color:C.textSub,cursor:cp>=parsed.pages.length-1?"not-allowed":"pointer",opacity:cp>=parsed.pages.length-1?.35:1}}>다음 ▶</button>
        </div>
        <div style={{textAlign:"center",marginTop:".55rem",fontSize:".7rem",color:C.textGhost,letterSpacing:".05em"}}>{Math.round(progress)}% 완료 · {globalIdx} / {totalW} 어절</div>
      </div>
      {audSrc&&<audio ref={audRef} src={audSrc} style={{display:"none"}}/>}
    </div>
  );

  /* ════ ④ QUIZ ════ */
  if (phase==="quiz") {
    const q = activeQuiz[qi];
    if (!q) return null;
    return (
      <div style={{minHeight:"100vh",background:C.bg,fontFamily:FONT,color:C.text}}>
        <div style={{background:C.surface,boxShadow:C.shadow,padding:".85rem 1.5rem",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:".75rem"}}>
            <button onClick={()=>setPhase("reading")} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:"6px",padding:".3rem .6rem",cursor:"pointer",fontSize:".85rem",color:C.textSub,fontFamily:FONT}}>← 다시읽기</button>
            <div><div style={{fontSize:".62rem",letterSpacing:".12em",color:C.primary}}>이해도 퀴즈 · AI 생성</div><div style={{fontSize:"1rem",fontWeight:700}}>{title}</div></div>
          </div>
          <span className="badge" style={{background:C.primaryLight,color:C.primary,border:`1px solid ${C.primaryBorder}`}}>{qi+1} / {activeQuiz.length}</span>
        </div>
        <div style={{maxWidth:"600px",margin:"0 auto",padding:"2rem 1rem"}}>
          <div style={{display:"flex",gap:".45rem",justifyContent:"center",marginBottom:"2rem"}}>
            {activeQuiz.map((_,i)=>(
              <div key={i} style={{width:i===qi?"24px":"8px",height:"8px",borderRadius:"4px",background:i<qi||quizDone?C.primary:i===qi?C.primary:C.border,opacity:i<qi||quizDone?.5:1,transition:"all .25s"}}/>
            ))}
          </div>
          {quizDone?(
            <div style={{textAlign:"center",padding:"2rem 0"}}>
              <div style={{fontSize:"2.5rem",marginBottom:".75rem"}}>✏️</div>
              <div style={{fontSize:"1.1rem",fontWeight:700,color:C.text,marginBottom:".4rem"}}>모든 문제를 풀었습니다!</div>
              <div style={{fontSize:".88rem",color:C.textSub,marginBottom:"2rem"}}>{answers.filter(a=>a.isCorrect).length} / {activeQuiz.length} 예상 정답</div>
              <button onClick={()=>setPhase("ad")} style={{width:"100%",padding:"1.1rem",borderRadius:"10px",border:"none",background:C.primary,color:"#fff",fontFamily:FONT,fontSize:"1.05rem",fontWeight:700,cursor:"pointer",boxShadow:"0 3px 14px rgba(55,138,221,.35)",letterSpacing:".08em"}}>정답 보기 →</button>
            </div>
          ):(
            <>
              <div className="card" style={{marginBottom:"1.25rem"}}>
                <div style={{fontSize:".68rem",fontWeight:700,letterSpacing:".15em",color:C.primary,marginBottom:".55rem"}}>문제 {qi+1}</div>
                <div style={{fontSize:"1.05rem",fontWeight:700,lineHeight:"1.75",color:C.text}}>{q.question}</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:".6rem",marginBottom:"1.5rem"}}>
                {q.choices.map((c,i)=>{
                  const on=sel===c;
                  return <button key={i} onClick={()=>setSel(c)} style={{padding:".9rem 1rem",borderRadius:"10px",cursor:"pointer",fontFamily:FONT,border:`2px solid ${on?C.primary:C.border}`,background:on?C.primaryLight:C.surface,textAlign:"left",fontSize:".95rem",fontWeight:on?700:400,color:on?C.primary:C.text,transition:"all .12s"}}>{c}</button>;
                })}
              </div>
              <button onClick={submitAnswer} disabled={sel===null} style={{width:"100%",padding:"1rem",borderRadius:"10px",border:"none",background:sel!==null?C.primary:C.textGhost,color:"#fff",fontFamily:FONT,fontSize:"1rem",fontWeight:700,cursor:sel!==null?"pointer":"not-allowed",letterSpacing:".08em",transition:"background .2s"}}>
                {qi+1<activeQuiz.length?"다음 문제 →":"제출하기"}
              </button>
            </>
          )}
        </div>
      </div>
    );
  }

  /* ════ ⑤ AD ════ */
  if (phase==="ad") return (
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:FONT,color:C.text,display:"flex",flexDirection:"column"}}>
      <div style={{background:C.surface,boxShadow:C.shadow,padding:".85rem 1.5rem"}}>
        <div style={{fontSize:".62rem",letterSpacing:".12em",color:C.primary,marginBottom:".1rem"}}>정답 확인 중</div>
        <div style={{fontSize:"1rem",fontWeight:700}}>{title}</div>
      </div>
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"2rem 1rem"}}>
        <div style={{maxWidth:"600px",width:"100%"}}>
          <div style={{textAlign:"center",marginBottom:"1.5rem"}}>
            <div style={{fontSize:"1.5rem",marginBottom:".5rem"}}>📢</div>
            <div style={{fontSize:".9rem",color:C.textSub}}>잠시 후 정답을 확인할 수 있습니다</div>
          </div>
          <div className="card" style={{marginBottom:"1.5rem",minHeight:"250px",display:"flex",alignItems:"center",justifyContent:"center",border:`1px dashed ${C.border}`}}>
            <ins className="adsbygoogle" style={{display:"block",width:"100%",minHeight:"250px"}}
              data-ad-client={AD_CLIENT} data-ad-slot={AD_SLOT}
              data-ad-format="auto" data-full-width-responsive="true"/>
          </div>
          <button onClick={()=>setPhase("result")} disabled={adCountdown>0} style={{width:"100%",padding:"1.1rem",borderRadius:"10px",border:"none",background:adCountdown>0?C.textGhost:C.primary,color:"#fff",fontFamily:FONT,fontSize:"1rem",fontWeight:700,cursor:adCountdown>0?"not-allowed":"pointer",letterSpacing:".08em",transition:"background .3s",boxShadow:adCountdown>0?"none":"0 3px 14px rgba(55,138,221,.35)"}}>
            {adCountdown>0?`${adCountdown}초 후 정답 확인 가능`:"정답 확인하기 →"}
          </button>
        </div>
      </div>
    </div>
  );

  /* ════ ⑥ RESULT ════ */
  if (phase==="result") {
    const score=answers.filter(a=>a.isCorrect).length;
    const total=activeQuiz.length;
    const scoreColor=score===total?C.ok:score>=total/2?C.primary:C.err;
    return (
      <div style={{minHeight:"100vh",background:C.bg,fontFamily:FONT,color:C.text}}>
        <div style={{background:C.surface,boxShadow:C.shadow,padding:".85rem 1.5rem"}}>
          <div style={{fontSize:".62rem",letterSpacing:".12em",color:C.primary,marginBottom:".1rem"}}>퀴즈 결과</div>
          <div style={{fontSize:"1rem",fontWeight:700}}>{title}</div>
        </div>
        <div style={{maxWidth:"600px",margin:"0 auto",padding:"2rem 1rem"}}>
          <div className="card" style={{textAlign:"center",padding:"2.25rem",marginBottom:"1.25rem"}}>
            <div style={{fontSize:"3.5rem",fontWeight:700,color:scoreColor,lineHeight:1,marginBottom:".35rem"}}>
              {score}<span style={{fontSize:"1.75rem",color:C.textGhost}}>/{total}</span>
            </div>
            <div style={{fontSize:".9rem",color:C.textSub,marginTop:".5rem"}}>
              {score===total?"완벽합니다! 🎉":score>=total/2?"잘 하셨습니다 👍":"본문을 다시 읽어보세요 📖"}
            </div>
            <div style={{marginTop:"1rem",fontSize:"1.4rem",letterSpacing:".15em"}}>
              {Array.from({length:total}).map((_,i)=><span key={i} style={{color:i<score?"#f59e0b":C.border}}>★</span>)}
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:".65rem",marginBottom:"1.5rem"}}>
            {activeQuiz.map((q,i)=>{
              const ans=answers[i]; const ok=ans?.isCorrect;
              return (
                <div key={i} className="card" style={{borderLeft:`3px solid ${ok?C.ok:C.err}`,padding:"1rem 1.25rem"}}>
                  <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:".5rem"}}>
                    <div style={{fontSize:".9rem",fontWeight:700,color:C.text,lineHeight:1.55,flex:1}}>{i+1}. {q.question}</div>
                    <span style={{fontSize:"1rem",flexShrink:0}}>{ok?"✅":"❌"}</span>
                  </div>
                  {!ok&&(
                    <div style={{marginTop:".5rem",paddingTop:".5rem",borderTop:`1px solid ${C.border}`}}>
                      <div style={{fontSize:".78rem",color:C.err,marginBottom:".2rem"}}>내 답: {ans?.choice||"—"}</div>
                      <div style={{fontSize:".78rem",color:C.ok}}>정답: {ans?.correctChoice||q.answer}</div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          <div style={{display:"flex",gap:".75rem",marginBottom:".75rem"}}>
            <button onClick={()=>{setPhase("reading");resetReading();setReadCnt(0);}} style={{flex:1,padding:".85rem",borderRadius:"10px",border:`1px solid ${C.border}`,background:C.bg,fontFamily:FONT,fontSize:".9rem",color:C.textSub,cursor:"pointer",fontWeight:700}}>↺ 처음부터 읽기</button>
            <button onClick={generateQuiz} disabled={aiGenerating} style={{flex:1,padding:".85rem",borderRadius:"10px",border:"none",background:aiGenerating?C.textGhost:C.primary,color:"#fff",fontFamily:FONT,fontSize:".9rem",fontWeight:700,cursor:aiGenerating?"not-allowed":"pointer",boxShadow:aiGenerating?"none":"0 2px 10px rgba(55,138,221,.3)"}}>
              {aiGenerating?"생성 중…":"🔀 새 문제 풀기"}
            </button>
          </div>
          <button onClick={()=>setPhase("home")} style={{width:"100%",padding:".7rem",borderRadius:"10px",border:`1px solid ${C.border}`,background:"none",fontFamily:FONT,fontSize:".85rem",color:C.textSub,cursor:"pointer"}}>처음으로 →</button>
        </div>
      </div>
    );
  }
  return null;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<SpeedReader/>);
</script>
</body>
</html>
