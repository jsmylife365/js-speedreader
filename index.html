<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JS 독서능력 향상훈련</title>
<!-- AdSense — 본인 ID로 교체 -->
<!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script> -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; overflow: hidden; }
  body { font-family: 'Malgun Gothic','Apple SD Gothic Neo','맑은 고딕',sans-serif; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 2px; }
  @keyframes spin    { to { transform: rotate(360deg); } }
  @keyframes slideUp { from { transform:translateY(100%); opacity:0; } to { transform:translateY(0); opacity:1; } }
  @keyframes fadeIn  { from { opacity:0; } to { opacity:1; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

const OR   = "#b86a2e";
const OR2  = "#8f4d18";
const ORL  = "rgba(184,106,46,0.13)";
const FONT = "'Malgun Gothic','Apple SD Gothic Neo','맑은 고딕',sans-serif";
const SERVER = "https://jsmylife365.github.io/js-speedreader";
const AD_CLIENT = "ca-pub-XXXXXXXXXXXXXXXX";
const AD_SLOT   = "XXXXXXXXXX";
const FBL = { 8:"1.6rem", 9:"1.42rem", 10:"1.25rem" };

/* ── 파싱 ── */
function parseLines(t) {
  const n=t.split("\n").map(l=>l.trim()).filter(Boolean);
  if(n.length>=3) return n;
  return t.trim().replace(/([.!?。])\s+/g,"$1\n").split("\n").map(l=>l.trim()).filter(Boolean);
}
function parseQuiz(raw) {
  if(!raw.trim()) return [];
  const qs=[];
  raw.trim().split(/\n\s*\n+/).forEach(b=>{
    const ls=b.split("\n").map(l=>l.trim()).filter(Boolean);
    if(ls.length<3) return;
    const q=ls[0].replace(/^\d+[.\s]+/,"").trim();
    const c=ls.filter(l=>/^[①②③④⑤]/.test(l));
    const a=ls.find(l=>/^정답\s*[:：]/.test(l));
    const ans=a?a.replace(/^정답\s*[:：]\s*/,"").trim()[0]:"";
    if(q&&c.length>=2) qs.push({question:q,choices:c,answer:ans});
  });
  return qs.slice(0,5);
}
function parseTxt(raw,lpp) {
  const qi=raw.indexOf("[QUIZ]");
  const body=(qi>=0?raw.slice(0,qi):raw).trim();
  const quiz=qi>=0?raw.slice(qi+6).trim():"";
  const lines=parseLines(body);
  const pages=[];
  for(let i=0;i<lines.length;i+=lpp) pages.push(lines.slice(i,i+lpp).join(" "));
  return {pages:pages.length?pages:[body],quiz:parseQuiz(quiz)};
}
function pickRandom(arr,n){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a.slice(0,n);
}

/* ── 오버레이 ── */
function Overlay({title,onClose,children}){
  return (
    <div style={{position:"fixed",inset:0,zIndex:200,background:"rgba(0,0,0,0.5)",animation:"fadeIn .2s",display:"flex",flexDirection:"column"}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{marginTop:"auto",background:"#fff",borderRadius:"18px 18px 0 0",maxHeight:"78vh",display:"flex",flexDirection:"column",animation:"slideUp .22s"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"1rem 1.25rem .8rem",borderBottom:"1px solid #f0ebe5"}}>
          <span style={{fontWeight:700,fontSize:"1rem",color:"#1e2a38"}}>{title}</span>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:"1.4rem",color:"#aaa",cursor:"pointer",lineHeight:1,padding:".1rem .4rem"}}>×</button>
        </div>
        <div style={{overflowY:"auto",padding:"1rem 1.25rem 1.75rem"}}>{children}</div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   메인 앱
══════════════════════════════════════════ */
function App() {
  const [sItems,  setSItems]  = useState([]);
  const [sStat,   setSStat]   = useState("idle");
  const [raw,     setRaw]     = useState("");
  const [title,   setTitle]   = useState("");
  const [audUrl,  setAudUrl]  = useState(null);

  const [lpp,  setLpp]  = useState(9);
  const [lvl,  setLvl]  = useState("중");
  const [wpm,  setWpm]  = useState(200);
  const [bwpm, setBwpm] = useState(180);
  const [sync, setSync] = useState(true);

  const [cp,  setCp]       = useState(0);
  const [ci,  setCi]       = useState(0);
  const [playing,setPlay]  = useState(false);
  const [done,   setDone]  = useState(false);
  const [readCnt,setRC]    = useState(0);

  const [phase,  setPhase]  = useState("read");
  const [qi,     setQi]     = useState(0);
  const [sel,    setSel]    = useState(null);
  const [answers,setAns]    = useState([]);
  const [activeQ,setAQ]     = useState([]);
  const [aiGen,  setAiGen]  = useState(false);
  const [qDone,  setQDone]  = useState(false);
  const [adCnt,  setAdCnt]  = useState(5);

  const [panel, setPanel] = useState(null);

  const audRef=useRef(null);
  const timer =useRef(null);
  const cpR=useRef(0),ciR=useRef(0),gsR=useRef(2),sdR=useRef(null);

  useEffect(()=>{cpR.current=cp;},[cp]);
  useEffect(()=>{ciR.current=ci;},[ci]);

  const groupSize=useMemo(()=>({하:1,중:2,상:3}[lvl]),[lvl]);
  const fontSize =useMemo(()=>FBL[lpp]||"1.3rem",[lpp]);
  const ms       =useMemo(()=>Math.round((groupSize*60000)/wpm),[groupSize,wpm]);
  const rate     =useMemo(()=>Math.min(4,Math.max(0.25,wpm/bwpm)),[wpm,bwpm]);

  useEffect(()=>{gsR.current=groupSize;},[groupSize]);
  const parsed=useMemo(()=>raw?parseTxt(raw,lpp):{pages:[],quiz:[]},[raw,lpp]);
  useEffect(()=>{sdR.current=parsed;},[parsed]);

  const pageWords=useMemo(()=>parsed.pages[cp]?.split(/\s+/).filter(Boolean)??[],[parsed,cp]);

  const {totalW,pageBounds}=useMemo(()=>{
    if(!parsed.pages.length) return {totalW:0,pageBounds:[]};
    let s=0;
    const pb=parsed.pages.map(p=>{const wc=p.split(/\s+/).filter(Boolean).length;const st=s;s+=wc;return{start:st,end:s};});
    return {totalW:s,pageBounds:pb};
  },[parsed]);

  const globalIdx=(pageBounds[cp]?.start??0)+ci;
  const progress=totalW>0?(globalIdx/totalW)*100:0;

  /* ── 서버 연결 ── */
  const connect=useCallback(async()=>{
    setSStat("loading");
    try{
      const res=await fetch(`${SERVER}/Data/index.json`);
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const titles=await res.json();
      setSItems(titles.map(t=>({id:t,title:t})));
      setSStat("ok");
    }catch(e){setSStat("error");}
  },[]);
  useEffect(()=>{connect();},[]);

  /* ── 콘텐츠 로드 ── */
  const loadItem=useCallback(async(item)=>{
    try{
      const r=await fetch(`${SERVER}/Data/${item.title}.txt`);
      if(!r.ok) throw new Error(`${item.title}.txt — HTTP ${r.status}`);
      setRaw(await r.text()); setTitle(item.title);
      // MP3: 직접 URL 사용 (blob 변환 없음 → 재생 안정성↑)
      const mp3=`${SERVER}/Data/${item.title}.mp3`;
      try{
        const h=await fetch(mp3,{method:"HEAD"});
        setAudUrl(h.ok?mp3:null);
      }catch(_){setAudUrl(null);}
    }catch(e){alert("로드 실패: "+e.message);return;}
    setCp(0);setCi(0);setPlay(false);setDone(false);setRC(0);
    setPhase("read");setPanel(null);
  },[]);

  /* ── 타이머 ── */
  useEffect(()=>{
    clearInterval(timer.current);
    if(!playing||done) return;
    timer.current=setInterval(()=>{
      const sd=sdR.current; if(!sd?.pages.length) return;
      const p=cpR.current,i=ciR.current,g=gsR.current;
      const words=sd.pages[p].split(/\s+/).filter(Boolean);
      const nx=i+g;
      if(nx>=words.length){
        if(p+1>=sd.pages.length){clearInterval(timer.current);setPlay(false);setDone(true);setRC(c=>c+1);}
        else{setCp(p+1);setCi(0);}
      }else setCi(nx);
    },ms);
    return()=>clearInterval(timer.current);
  },[playing,done,ms]);

  /* ── 오디오 동기화 ── */
  useEffect(()=>{
    if(!audRef.current||!audUrl) return;
    try{audRef.current.playbackRate=sync?rate:1;}catch(_){}
  },[rate,sync,audUrl]);

  /* ── 시작 ── */
  const handleStart=useCallback(()=>{
    if(!raw){setPanel("data");return;}
    if(done){setCp(0);setCi(0);setDone(false);}
    setPlay(true);
    if(audRef.current&&audUrl){
      try{audRef.current.playbackRate=sync?rate:1;}catch(_){}
      audRef.current.play().catch(e=>console.warn("play:",e));
    }
  },[raw,done,audUrl,sync,rate]);

  /* ── 마침 ── */
  const handleStop=useCallback(()=>{
    setPlay(false);
    if(audRef.current) audRef.current.pause();
  },[]);

  /* ── 페이지 이동 ── */
  const goPage=useCallback((d)=>{
    const t=cpR.current+d;
    if(!parsed.pages||t<0||t>=parsed.pages.length) return;
    setPlay(false);if(audRef.current) audRef.current.pause();
    setCp(t);setCi(0);setDone(false);
  },[parsed]);

  /* ── AI 퀴즈 ── */
  const generateQuiz=useCallback(async()=>{
    setAiGen(true);setPanel(null);
    try{
      const ft=parsed.pages.join(" ");
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
          messages:[{role:"user",content:`다음 글을 읽고 독해 이해도를 평가하는 객관식 문제 10개를 만들어 주세요.\n\n[본문]\n${ft}\n\n반드시 아래 JSON 배열 형식으로만 응답하세요. 설명이나 다른 텍스트는 절대 포함하지 마세요.\n[\n  {\n    "question": "질문",\n    "choices": ["① 선택지1","② 선택지2","③ 선택지3","④ 선택지4"],\n    "answer": "②"\n  }\n]\n\n조건: 본문 근거, 선택지 4개, answer는 ①②③④ 중 하나, 한국어`}]})
      });
      const data=await res.json();
      const txt=data.content?.find(b=>b.type==="text")?.text||"";
      const qs=JSON.parse(txt.replace(/```json|```/g,"").trim());
      if(!Array.isArray(qs)||!qs.length) throw new Error("파싱 실패");
      setAQ(pickRandom(qs,5));
      setQi(0);setSel(null);setAns([]);setQDone(false);
      setPhase("quiz");
    }catch(e){alert("AI 문제 생성 실패: "+e.message);}
    finally{setAiGen(false);}
  },[parsed.pages]);

  /* ── 퀴즈 제출 ── */
  const submitAnswer=useCallback(()=>{
    if(sel===null) return;
    const q=activeQ[qi];
    const na=[...answers,{choice:sel,isCorrect:sel[0]===q.answer,correctChoice:q.choices.find(c=>c[0]===q.answer)||q.answer}];
    setAns(na);
    if(qi+1>=activeQ.length) setQDone(true);
    else{setQi(qi+1);setSel(null);}
  },[sel,qi,activeQ,answers]);

  /* ── 광고 타이머 ── */
  useEffect(()=>{
    if(phase!=="ad") return;
    setAdCnt(5);
    const t=setInterval(()=>setAdCnt(c=>{if(c<=1){clearInterval(t);return 0;}return c-1;}),1000);
    return()=>clearInterval(t);
  },[phase]);
  useEffect(()=>{if(phase==="ad"&&adCnt===0)setPhase("result");},[phase,adCnt]);
  useEffect(()=>{if(phase!=="ad")return;try{(window.adsbygoogle=window.adsbygoogle||[]).push({});}catch(_){}},[phase]);

  /* ── 낱말 렌더링 ── */
  const renderWords=useCallback(()=>
    pageWords.map((w,i)=>{
      const on=i>=ci&&i<ci+groupSize,old=i<ci;
      return <span key={i} style={{fontWeight:700,color:on?OR:old?"#ccc":"#1e2a38",transition:"color .08s",marginRight:".4em"}}>{w}</span>;
    }),[pageWords,ci,groupSize]);

  const toggleFS=()=>{
    if(!document.fullscreenElement) document.documentElement.requestFullscreen?.();
    else document.exitFullscreen?.();
  };

  /* ── 하단 버튼 스타일 ── */
  const B=(act=false)=>({display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"2px",padding:"0 .5rem",cursor:"pointer",border:"none",background:act?"rgba(255,255,255,0.22)":"transparent",color:"#fff",fontFamily:FONT,borderRadius:"8px",minWidth:"48px",height:"50px",transition:"background .12s"});
  const BL={fontSize:".62rem",letterSpacing:".02em",marginTop:"1px"};

  /* ════════════════════════
     읽기 화면
  ════════════════════════ */
  if(phase==="read") return (
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:"#f5f0eb",fontFamily:FONT}}>

      {/* 상단 바 */}
      <div style={{background:`linear-gradient(to right,${OR2},${OR})`,padding:".5rem 1rem",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,boxShadow:"0 2px 10px rgba(0,0,0,.22)"}}>
        <div style={{display:"flex",alignItems:"center",gap:".6rem",flexWrap:"wrap"}}>
          <div style={{background:"rgba(255,255,255,.22)",borderRadius:"7px",padding:".22rem .65rem",fontSize:".8rem",color:"#fff",fontWeight:700}}>
            {parsed.pages.length>0?`${cp+1} / ${parsed.pages.length}p`:"—"}
          </div>
          {raw&&<div style={{background:"rgba(255,255,255,.15)",borderRadius:"7px",padding:".22rem .65rem",fontSize:".78rem",color:"#fff"}}>{wpm}wpm · {lvl}</div>}
          {audUrl&&<div style={{background:"rgba(255,255,255,.15)",borderRadius:"7px",padding:".22rem .65rem",fontSize:".75rem",color:"#fff"}}>🔊{sync?" "+rate.toFixed(1)+"x":""}</div>}
          {parsed.pages.length>1&&(
            <div style={{display:"flex",gap:".25rem"}}>
              <button onClick={()=>goPage(-1)} disabled={cp===0} style={{background:"rgba(255,255,255,.2)",border:"none",borderRadius:"6px",color:"#fff",cursor:"pointer",padding:".18rem .5rem",fontSize:".8rem",opacity:cp===0?.35:1}}>◀</button>
              <button onClick={()=>goPage(1)} disabled={cp>=parsed.pages.length-1} style={{background:"rgba(255,255,255,.2)",border:"none",borderRadius:"6px",color:"#fff",cursor:"pointer",padding:".18rem .5rem",fontSize:".8rem",opacity:cp>=parsed.pages.length-1?.35:1}}>▶</button>
            </div>
          )}
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:".58rem",color:"rgba(255,255,255,.7)",letterSpacing:".05em",maxWidth:"160px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{title||"자료를 선택하세요"}</div>
            <div style={{fontSize:".82rem",fontWeight:700,color:"#fff",letterSpacing:".04em",lineHeight:1.25}}>JS 독서능력<br/>향상훈련</div>
        </div>
      </div>

      {/* 진행 바 */}
      <div style={{height:"3px",background:"rgba(184,106,46,.18)",flexShrink:0}}>
        <div style={{height:"100%",width:`${progress}%`,background:OR,transition:"width .3s"}}/>
      </div>

      {/* 본문 */}
      <div style={{flex:1,overflow:"auto"}}>
        {!raw?(
          <div style={{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:".65rem",color:"#bbb",padding:"2rem"}}>
            <div style={{fontSize:"3rem"}}>📚</div>
            <div style={{fontSize:"1rem",fontWeight:700,color:"#aaa",textAlign:"center"}}>아래 데이터 버튼을 눌러 읽기 자료를 선택하세요</div>
            {sStat==="loading"&&<div style={{fontSize:".82rem",color:OR}}>서버 연결 중…</div>}
            {sStat==="error"&&<div style={{fontSize:".82rem",color:"#e74c3c"}}>서버 연결 실패</div>}
          </div>
        ):done?(
          <div style={{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:".85rem",padding:"2rem"}}>
            <div style={{fontSize:"2.8rem"}}>{readCnt===1?"✅":"🎉"}</div>
            <div style={{fontSize:"1.25rem",fontWeight:700,color:"#1e2a38"}}>{readCnt===1?"1회 완독!":"2회 완독 완료!"}</div>
            <div style={{fontSize:".88rem",color:"#999"}}>{totalW}어절 · {parsed.pages.length}페이지</div>
            <div style={{display:"flex",flexDirection:"column",gap:".65rem",width:"100%",maxWidth:"280px",marginTop:".35rem"}}>
              {readCnt===1&&(
                <button onClick={()=>{setDone(false);setCp(0);setCi(0);setPlay(false);}} style={{padding:".85rem",borderRadius:"10px",border:"1px solid #ddd",background:"#fff",fontFamily:FONT,fontSize:".9rem",color:"#666",cursor:"pointer",fontWeight:700}}>⚙ 설정 바꾸고 다시보기</button>
              )}
              <button onClick={generateQuiz} disabled={aiGen} style={{padding:".85rem",borderRadius:"10px",border:"none",background:aiGen?"#ccc":OR,color:"#fff",fontFamily:FONT,fontSize:".9rem",fontWeight:700,cursor:aiGen?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:".5rem",boxShadow:`0 2px 12px rgba(184,106,46,.3)`}}>
                {aiGen?<><span style={{animation:"spin 1s linear infinite",display:"inline-block"}}>⏳</span>생성 중…</>:"📝 문제 풀기"}
              </button>
            </div>
          </div>
        ):(
          <div style={{maxWidth:"720px",margin:"0 auto",padding:"1.75rem 2rem",fontSize,lineHeight:"2.2",letterSpacing:".015em",textAlign:"justify",wordBreak:"keep-all"}}>
            {renderWords()}
          </div>
        )}
      </div>

      {/* 하단 바 */}
      <div style={{background:`linear-gradient(to right,${OR},${OR2})`,flexShrink:0,boxShadow:"0 -2px 10px rgba(0,0,0,.2)",display:"flex",alignItems:"center",justifyContent:"space-around",padding:".3rem .4rem",paddingBottom:"calc(.3rem + env(safe-area-inset-bottom))"}}>

        <button style={B(panel==="level")} onClick={()=>setPanel(p=>p==="level"?null:"level")}>
          <span style={{fontSize:"1.05rem"}}>📊</span>
          <span style={BL}>수준({lvl})</span>
        </button>

        <button style={B(panel==="speed")} onClick={()=>setPanel(p=>p==="speed"?null:"speed")}>
          <span style={{fontSize:"1.05rem"}}>⚡</span>
          <span style={BL}>속도</span>
        </button>

        {/* 시작 — 원형 강조 */}
        <button onClick={handleStart} style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",width:"58px",height:"58px",borderRadius:"50%",border:"none",background:playing?"rgba(255,255,255,.18)":"rgba(255,255,255,.32)",color:"#fff",cursor:"pointer",boxShadow:playing?"none":"0 3px 12px rgba(0,0,0,.25)",transition:"all .15s",fontFamily:FONT}}>
          <span style={{fontSize:"1.5rem"}}>{playing?"⏸":"▶"}</span>
        </button>

        <button style={B(false)} onClick={handleStop}>
          <span style={{fontSize:"1.05rem"}}>⏹</span>
          <span style={BL}>마침</span>
        </button>

        <button style={B(panel==="data")} onClick={()=>setPanel(p=>p==="data"?null:"data")}>
          <span style={{fontSize:"1.05rem"}}>📚</span>
          <span style={BL}>데이터</span>
        </button>

        <button style={B(panel==="settings")} onClick={()=>setPanel(p=>p==="settings"?null:"settings")}>
          <span style={{fontSize:"1.05rem"}}>⚙</span>
          <span style={BL}>설정</span>
        </button>

        <button style={B(false)} onClick={toggleFS}>
          <span style={{fontSize:"1.05rem"}}>⛶</span>
          <span style={BL}>화면확대</span>
        </button>
      </div>

      {/* ── 속도 패널 ── */}
      {panel==="speed"&&(
        <Overlay title="읽기 속도" onClose={()=>setPanel(null)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:".7rem"}}>
            <span style={{fontSize:".9rem",color:"#555"}}>속도 조절</span>
            <span style={{fontWeight:700,color:OR,fontSize:"1rem"}}>{wpm} wpm</span>
          </div>
          <input type="range" min={60} max={500} step={10} value={wpm} onChange={e=>setWpm(Number(e.target.value))} style={{width:"100%",accentColor:OR,marginBottom:".45rem"}}/>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:".7rem",color:"#bbb"}}>
            <span>60 느림</span><span>간격 {ms}ms</span><span>500 빠름</span>
          </div>
          {audUrl&&(
            <div style={{marginTop:"1rem",padding:".85rem",background:"#faf6f2",borderRadius:"10px"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:".55rem"}}>
                <span style={{fontSize:".85rem",color:"#555"}}>음원 기준 속도</span>
                <span style={{fontWeight:700,color:OR}}>{bwpm} wpm</span>
              </div>
              <input type="range" min={60} max={300} step={10} value={bwpm} onChange={e=>setBwpm(Number(e.target.value))} style={{width:"100%",accentColor:OR,marginBottom:".5rem"}}/>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <span style={{fontSize:".8rem",color:"#777"}}>배속 <strong style={{color:OR}}>{rate.toFixed(2)}x</strong>{rate>=1.5&&<span style={{color:"#d68910",marginLeft:".3em"}}>속청</span>}</span>
                <button onClick={()=>setSync(s=>!s)} style={{padding:".25rem .65rem",borderRadius:"6px",border:`1px solid ${sync?OR:"#ddd"}`,background:sync?ORL:"none",color:sync?OR:"#aaa",fontFamily:FONT,fontSize:".78rem",cursor:"pointer"}}>동기화 {sync?"ON":"OFF"}</button>
              </div>
            </div>
          )}
        </Overlay>
      )}

      {/* ── 수준 패널 ── */}
      {panel==="level"&&(
        <Overlay title="수준 선택" onClose={()=>setPanel(null)}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:".65rem",marginBottom:"1rem"}}>
            {[["하","1낱말","큰 글자"],["중","2낱말","중간"],["상","3낱말","보통"]].map(([l,w,d])=>(
              <button key={l} onClick={()=>{setLvl(l);setPanel(null);}} style={{padding:"1rem .5rem",borderRadius:"10px",border:`2px solid ${lvl===l?OR:"#e5ddd5"}`,background:lvl===l?ORL:"#faf6f2",fontFamily:FONT,cursor:"pointer",textAlign:"center",transition:"all .12s"}}>
                <div style={{fontSize:"1.25rem",fontWeight:700,color:lvl===l?OR:"#333"}}>{l}</div>
                <div style={{fontSize:".78rem",color:OR,marginTop:".12rem"}}>{w}</div>
                <div style={{fontSize:".68rem",color:"#aaa",marginTop:".08rem"}}>{d}</div>
              </button>
            ))}
          </div>
          <div style={{background:"#faf6f2",borderRadius:"9px",padding:".7rem .9rem",fontSize:".8rem",color:"#888",display:"flex",gap:"1.5rem"}}>
            <span>📄 {parsed.pages.length}페이지</span>
            <span>{parsed.quiz.length>0?`📝 ${parsed.quiz.length}문제`:"📝 AI 생성 가능"}</span>
          </div>
        </Overlay>
      )}

      {/* ── 설정 패널 ── */}
      {panel==="settings"&&(
        <Overlay title="설정" onClose={()=>setPanel(null)}>
          <div style={{marginBottom:"1rem"}}>
            <div style={{fontSize:".75rem",fontWeight:700,color:"#999",marginBottom:".65rem",letterSpacing:".06em"}}>페이지 당 줄 수 (글자 크기)</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:".6rem"}}>
              {[[8,"8줄","큰 글자"],[9,"9줄","중간"],[10,"10줄","보통"]].map(([n,l,d])=>(
                <button key={n} onClick={()=>setLpp(n)} style={{padding:".75rem .5rem",borderRadius:"9px",border:`2px solid ${lpp===n?OR:"#e5ddd5"}`,background:lpp===n?ORL:"#faf6f2",fontFamily:FONT,cursor:"pointer",textAlign:"center"}}>
                  <div style={{fontSize:"1rem",fontWeight:700,color:lpp===n?OR:"#333"}}>{l}</div>
                  <div style={{fontSize:".7rem",color:"#aaa",marginTop:".08rem"}}>{d}</div>
                </button>
              ))}
            </div>
          </div>
          <div style={{padding:".85rem",background:"#faf6f2",borderRadius:"10px",fontSize:".82rem"}}>
            {audUrl
              ?<><div style={{color:"#555",marginBottom:".4rem"}}>🎵 {title}.mp3 연결됨</div><button onClick={()=>setSync(s=>!s)} style={{padding:".28rem .75rem",borderRadius:"6px",border:`1px solid ${sync?OR:"#ddd"}`,background:sync?ORL:"none",color:sync?OR:"#aaa",fontFamily:FONT,fontSize:".78rem",cursor:"pointer"}}>속도 동기화 {sync?"ON":"OFF"}</button></>
              :<div style={{color:"#bbb"}}>🎵 이 콘텐츠에 음원 없음</div>
            }
          </div>
        </Overlay>
      )}

      {/* ── 데이터 패널 ── */}
      {panel==="data"&&(
        <Overlay title="읽기 자료 목록" onClose={()=>setPanel(null)}>
          {sStat==="loading"&&<div style={{textAlign:"center",padding:"2rem",color:"#bbb"}}>서버 연결 중…</div>}
          {sStat==="error"&&(
            <div style={{textAlign:"center",padding:"1.5rem"}}>
              <div style={{color:"#e74c3c",marginBottom:".75rem",fontSize:".9rem"}}>서버 연결 실패</div>
              <div style={{fontSize:".78rem",color:"#aaa",marginBottom:"1rem",lineHeight:1.6}}>GitHub Pages 배포 후 1~3분 소요됩니다.</div>
              <button onClick={connect} style={{padding:".55rem 1.25rem",borderRadius:"8px",border:"none",background:OR,color:"#fff",fontFamily:FONT,fontWeight:700,cursor:"pointer"}}>다시 연결</button>
            </div>
          )}
          {sItems.length>0&&(
            <div style={{display:"flex",flexDirection:"column",gap:".5rem"}}>
              {sItems.map(s=>(
                <button key={s.id} onClick={()=>loadItem(s)}
                  style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:".9rem 1rem",borderRadius:"10px",border:`1px solid ${title===s.title?OR:"#e5ddd5"}`,background:title===s.title?ORL:"#faf6f2",cursor:"pointer",fontFamily:FONT,textAlign:"left",transition:"all .12s"}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=OR;e.currentTarget.style.background=ORL;}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor=title===s.title?OR:"#e5ddd5";e.currentTarget.style.background=title===s.title?ORL:"#faf6f2";}}>
                  <div>
                    <div style={{fontSize:".95rem",fontWeight:700,color:title===s.title?OR:"#1e2a38"}}>{s.title}</div>
                    <div style={{fontSize:".7rem",color:"#bbb",marginTop:".12rem"}}>📡 서버 콘텐츠</div>
                  </div>
                  <div style={{color:OR,fontSize:"1.2rem"}}>›</div>
                </button>
              ))}
            </div>
          )}
          {sItems.length===0&&sStat==="ok"&&<div style={{textAlign:"center",padding:"2rem",color:"#bbb"}}>등록된 콘텐츠가 없습니다</div>}
        </Overlay>
      )}

      {audUrl&&<audio ref={audRef} src={audUrl} preload="auto" style={{display:"none"}}/>}
    </div>
  );

  /* ════════════════════════
     퀴즈 화면
  ════════════════════════ */
  if(phase==="quiz"){
    const q=activeQ[qi]; if(!q) return null;
    return(
      <div style={{minHeight:"100vh",background:"#f5f0eb",fontFamily:FONT,display:"flex",flexDirection:"column"}}>
        <div style={{background:`linear-gradient(to right,${OR2},${OR})`,padding:".65rem 1.25rem",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 2px 10px rgba(0,0,0,.2)"}}>
          <button onClick={()=>setPhase("read")} style={{background:"rgba(255,255,255,.2)",border:"none",borderRadius:"8px",padding:".32rem .75rem",color:"#fff",fontFamily:FONT,fontSize:".82rem",cursor:"pointer"}}>← 읽기</button>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:".58rem",color:"rgba(255,255,255,.7)",letterSpacing:".1em"}}>이해도 퀴즈 · AI</div>
            <div style={{fontWeight:700,color:"#fff",fontSize:".9rem"}}>JS 독서능력 향상훈련</div>
          </div>
          <div style={{background:"rgba(255,255,255,.2)",borderRadius:"8px",padding:".32rem .75rem",color:"#fff",fontSize:".82rem",fontWeight:700}}>{qi+1}/{activeQ.length}</div>
        </div>
        <div style={{maxWidth:"600px",margin:"0 auto",padding:"1.5rem 1rem",flex:1,width:"100%"}}>
          <div style={{display:"flex",gap:".4rem",justifyContent:"center",marginBottom:"1.5rem"}}>
            {activeQ.map((_,i)=><div key={i} style={{width:i===qi?"22px":"8px",height:"8px",borderRadius:"4px",background:i<qi||qDone?OR:i===qi?OR:"#ddd",opacity:i<qi||qDone?.5:1,transition:"all .22s"}}/>)}
          </div>
          {qDone?(
            <div style={{textAlign:"center",padding:"2rem 0"}}>
              <div style={{fontSize:"2.5rem",marginBottom:".7rem"}}>✏️</div>
              <div style={{fontSize:"1.1rem",fontWeight:700,marginBottom:".4rem",color:"#1e2a38"}}>모든 문제 완료!</div>
              <div style={{fontSize:".88rem",color:"#999",marginBottom:"2rem"}}>{answers.filter(a=>a.isCorrect).length} / {activeQ.length} 예상 정답</div>
              <button onClick={()=>setPhase("ad")} style={{width:"100%",padding:"1.1rem",borderRadius:"10px",border:"none",background:OR,color:"#fff",fontFamily:FONT,fontSize:"1.05rem",fontWeight:700,cursor:"pointer",boxShadow:`0 3px 14px rgba(184,106,46,.35)`,letterSpacing:".06em"}}>정답 보기 →</button>
            </div>
          ):(
            <>
              <div style={{background:"#fff",borderRadius:"12px",padding:"1.25rem",marginBottom:"1rem",boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
                <div style={{fontSize:".66rem",fontWeight:700,letterSpacing:".12em",color:OR,marginBottom:".5rem"}}>문제 {qi+1}</div>
                <div style={{fontSize:"1.05rem",fontWeight:700,lineHeight:"1.75",color:"#1e2a38"}}>{q.question}</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:".5rem",marginBottom:"1.2rem"}}>
                {q.choices.map((c,i)=>{
                  const on=sel===c;
                  return <button key={i} onClick={()=>setSel(c)} style={{padding:".9rem 1rem",borderRadius:"10px",cursor:"pointer",fontFamily:FONT,border:`2px solid ${on?OR:"#e5ddd5"}`,background:on?ORL:"#fff",textAlign:"left",fontSize:".95rem",fontWeight:on?700:400,color:on?OR:"#1e2a38",transition:"all .12s"}}>{c}</button>;
                })}
              </div>
              <button onClick={submitAnswer} disabled={sel===null} style={{width:"100%",padding:"1rem",borderRadius:"10px",border:"none",background:sel!==null?OR:"#ccc",color:"#fff",fontFamily:FONT,fontSize:"1rem",fontWeight:700,cursor:sel!==null?"pointer":"not-allowed",transition:"background .18s"}}>
                {qi+1<activeQ.length?"다음 문제 →":"제출하기"}
              </button>
            </>
          )}
        </div>
      </div>
    );
  }

  /* ════════════════════════
     광고 화면
  ════════════════════════ */
  if(phase==="ad") return(
    <div style={{minHeight:"100vh",background:"#f5f0eb",fontFamily:FONT,display:"flex",flexDirection:"column"}}>
      <div style={{background:`linear-gradient(to right,${OR2},${OR})`,padding:".65rem 1.25rem",boxShadow:"0 2px 10px rgba(0,0,0,.2)"}}>
        <div style={{fontSize:".58rem",color:"rgba(255,255,255,.7)",letterSpacing:".1em"}}>정답 확인 중</div>
        <div style={{fontWeight:700,color:"#fff",fontSize:".9rem"}}>JS 독서능력 향상훈련</div>
      </div>
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"2rem 1rem"}}>
        <div style={{maxWidth:"600px",width:"100%"}}>
          <div style={{textAlign:"center",marginBottom:"1.5rem"}}>
            <div style={{fontSize:"1.5rem",marginBottom:".4rem"}}>📢</div>
            <div style={{fontSize:".9rem",color:"#999"}}>잠시 후 정답을 확인할 수 있습니다</div>
          </div>
          <div style={{background:"#fff",borderRadius:"12px",padding:"1.5rem",marginBottom:"1.5rem",minHeight:"180px",display:"flex",alignItems:"center",justifyContent:"center",border:"1px dashed #ddd",boxShadow:"0 2px 8px rgba(0,0,0,.05)"}}>
            <ins className="adsbygoogle" style={{display:"block",width:"100%",minHeight:"150px"}} data-ad-client={AD_CLIENT} data-ad-slot={AD_SLOT} data-ad-format="auto" data-full-width-responsive="true"/>
          </div>
          <button onClick={()=>setPhase("result")} disabled={adCnt>0} style={{width:"100%",padding:"1.1rem",borderRadius:"10px",border:"none",background:adCnt>0?"#ccc":OR,color:"#fff",fontFamily:FONT,fontSize:"1rem",fontWeight:700,cursor:adCnt>0?"not-allowed":"pointer",transition:"background .3s",boxShadow:adCnt>0?"none":`0 3px 14px rgba(184,106,46,.3)`}}>
            {adCnt>0?`${adCnt}초 후 정답 확인 가능`:"정답 확인하기 →"}
          </button>
        </div>
      </div>
    </div>
  );

  /* ════════════════════════
     결과 화면
  ════════════════════════ */
  if(phase==="result"){
    const score=answers.filter(a=>a.isCorrect).length;
    const total=activeQ.length;
    const sc=score===total?"#27ae60":score>=total/2?OR:"#e74c3c";
    return(
      <div style={{minHeight:"100vh",background:"#f5f0eb",fontFamily:FONT}}>
        <div style={{background:`linear-gradient(to right,${OR2},${OR})`,padding:".65rem 1.25rem",boxShadow:"0 2px 10px rgba(0,0,0,.2)"}}>
          <div style={{fontSize:".58rem",color:"rgba(255,255,255,.7)",letterSpacing:".1em"}}>퀴즈 결과</div>
          <div style={{fontWeight:700,color:"#fff",fontSize:".9rem"}}>JS 독서능력 향상훈련</div>
        </div>
        <div style={{maxWidth:"600px",margin:"0 auto",padding:"1.5rem 1rem"}}>
          <div style={{background:"#fff",borderRadius:"14px",padding:"2rem",textAlign:"center",marginBottom:"1rem",boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
            <div style={{fontSize:"3.5rem",fontWeight:700,color:sc,lineHeight:1}}>{score}<span style={{fontSize:"1.5rem",color:"#ddd"}}>/{total}</span></div>
            <div style={{fontSize:".9rem",color:"#999",marginTop:".5rem"}}>{score===total?"완벽합니다! 🎉":score>=total/2?"잘 하셨습니다 👍":"본문을 다시 읽어보세요 📖"}</div>
            <div style={{marginTop:".85rem",fontSize:"1.4rem",letterSpacing:".12em"}}>
              {Array.from({length:total}).map((_,i)=><span key={i} style={{color:i<score?"#f59e0b":"#e5ddd5"}}>★</span>)}
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:".5rem",marginBottom:"1rem"}}>
            {activeQ.map((q,i)=>{
              const ans=answers[i];const ok=ans?.isCorrect;
              return(
                <div key={i} style={{background:"#fff",borderRadius:"10px",padding:"1rem 1.1rem",borderLeft:`3px solid ${ok?"#27ae60":"#e74c3c"}`,boxShadow:"0 1px 4px rgba(0,0,0,.04)"}}>
                  <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:".5rem"}}>
                    <div style={{fontSize:".88rem",fontWeight:700,color:"#1e2a38",lineHeight:1.55,flex:1}}>{i+1}. {q.question}</div>
                    <span style={{fontSize:".95rem",flexShrink:0}}>{ok?"✅":"❌"}</span>
                  </div>
                  {!ok&&(
                    <div style={{marginTop:".45rem",paddingTop:".45rem",borderTop:"1px solid #f5efe8"}}>
                      <div style={{fontSize:".76rem",color:"#e74c3c",marginBottom:".18rem"}}>내 답: {ans?.choice||"—"}</div>
                      <div style={{fontSize:".76rem",color:"#27ae60"}}>정답: {ans?.correctChoice||q.answer}</div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          <div style={{display:"flex",gap:".6rem",marginBottom:".6rem"}}>
            <button onClick={()=>{setPhase("read");setDone(false);setCp(0);setCi(0);setRC(0);}} style={{flex:1,padding:".82rem",borderRadius:"10px",border:"1px solid #ddd",background:"#fff",fontFamily:FONT,fontSize:".88rem",color:"#777",cursor:"pointer",fontWeight:700}}>↺ 다시 읽기</button>
            <button onClick={generateQuiz} disabled={aiGen} style={{flex:1,padding:".82rem",borderRadius:"10px",border:"none",background:aiGen?"#ccc":OR,color:"#fff",fontFamily:FONT,fontSize:".88rem",fontWeight:700,cursor:aiGen?"not-allowed":"pointer"}}>
              {aiGen?"생성 중…":"🔀 새 문제"}
            </button>
          </div>
          <button onClick={()=>{setPhase("read");setPanel("data");}} style={{width:"100%",padding:".65rem",borderRadius:"10px",border:"1px solid #ddd",background:"none",fontFamily:FONT,fontSize:".82rem",color:"#bbb",cursor:"pointer"}}>다른 자료 선택 →</button>
        </div>
      </div>
    );
  }
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
